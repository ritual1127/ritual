  <script>
    const IF_SCENARIOS = [60, 70, 80, 90, 100];
    const GRADE_COLORS = { A: '#2ecc71', B: '#007aff', C: '#ffcc00', D: '#ff9500', E: '#ff3b30' };

    let selectedSubject = null;
    let currentCfg = null;
    let editingSubject = null;

    function loadCustomSubjects() { return JSON.parse(localStorage.getItem('customSubjects') || '{}'); }
    function saveCustomSubjectsMap(map) { localStorage.setItem('customSubjects', JSON.stringify(map)); }

    function getGrade(score) {
      return score >= 90 ? 'A' : score >= 80 ? 'B' : score >= 70 ? 'C' : score >= 60 ? 'D' : 'E';
    }

    // Theme
    const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
    const themeToggle = document.getElementById('themeToggle');
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      themeToggle.textContent = theme === 'dark' ? '라이트 모드' : '다크 모드';
      localStorage.setItem('theme', theme);
      if (document.getElementById('graphView').style.display !== 'none') renderGraph();
    }
    applyTheme(localStorage.getItem('theme') || (mediaQuery.matches ? 'dark' : 'light'));
    themeToggle.onclick = () => applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const isGraph = tab.dataset.view === 'graph';
        document.getElementById('calcView').style.display = isGraph ? 'none' : 'block';
        document.getElementById('graphView').style.display = isGraph ? 'block' : 'none';
        if (isGraph) renderGraph();
      };
    });

    // Draft save per subject (scores + IF state only; ratios live in customSubjects)
    function saveDraft() {
      if (!selectedSubject || !currentCfg) return;
      const draft = { scores: [], examScores: [], ifModes: [] };
      currentCfg.performances.forEach((_, i) => draft.scores.push(document.getElementById(`s${i}`)?.value || ''));
      currentCfg.exams.forEach((_, i) => {
        draft.examScores.push(document.getElementById(`t${i}`)?.value || '');
        draft.ifModes.push(document.getElementById(`if${i}`)?.classList.contains('active') || false);
      });
      const all = JSON.parse(localStorage.getItem('subjectDrafts') || '{}');
      all[selectedSubject] = draft;
      localStorage.setItem('subjectDrafts', JSON.stringify(all));
    }

    function loadDraft(name) {
      return JSON.parse(localStorage.getItem('subjectDrafts') || '{}')[name] || null;
    }

    function applyDraft(draft) {
      draft.scores.forEach((v, i) => { const el = document.getElementById(`s${i}`); if (el) el.value = v; });
      draft.examScores.forEach((v, i) => { const el = document.getElementById(`t${i}`); if (el) el.value = v; });
      draft.ifModes.forEach((on, i) => {
        const btn = document.getElementById(`if${i}`);
        if (btn) { btn.classList.toggle('active', on); toggleIfMode(i, on); }
      });
    }

    function renderSubjectChips() {
      const names = Object.keys(loadCustomSubjects());
      const container = document.getElementById('subjectChips');
      container.innerHTML = names.length
        ? names.map(name => `<button type="button" class="subject-chip${selectedSubject === name ? ' active' : ''}" data-subject="${name}">${name}</button>`).join('')
        : '<span class="empty-hint">등록된 과목이 없습니다. "+ 과목 등록/관리"로 추가하세요.</span>';
      container.querySelectorAll('.subject-chip').forEach(chip => {
        chip.onclick = () => { saveDraft(); loadSubject(chip.dataset.subject); };
      });
    }

    function loadSubject(name) {
      selectedSubject = name;
      currentCfg = loadCustomSubjects()[name];
      renderSubjectChips();
      renderScoreInputs();
      const draft = loadDraft(name);
      if (draft) applyDraft(draft);
    }

    function renderScoreInputs() {
      const box = document.getElementById('inputs');
      if (!currentCfg) { box.innerHTML = '<div class="empty-hint">과목을 선택하거나 새로 등록하세요.</div>'; return; }

      let html = `<h2 style="margin-bottom:12px;">${selectedSubject}</h2><h2 style="font-size:16px;margin-bottom:12px;">수행평가</h2>`;
      currentCfg.performances.forEach((p, i) => {
        html += `
          <div class="entry">
            <label>${p.label} (${p.weight}%)${p.memo ? `<br><span style="font-size:12px;color:var(--muted);">${p.memo}</span>` : ''}</label>
            <input type="number" id="s${i}" placeholder="점수" min="0" max="100">
          </div>`;
      });

      html += '<h2 style="font-size:16px;margin:16px 0 12px;">지필평가</h2>';
      currentCfg.exams.forEach((ex, i) => {
        html += `
          <div class="entry" id="examEntry${i}">
            <label>${ex.label} (${ex.weight}%)</label>
            <div class="score-row">
              <input type="number" id="t${i}" class="exam-score" placeholder="점수" min="0" max="100">
              <button type="button" class="if-btn" id="if${i}" title="IF 모드: 시험 점수별 예상 원점수">IF</button>
            </div>
          </div>`;
      });

      box.innerHTML = html;
      currentCfg.exams.forEach((_, i) => {
        document.getElementById(`if${i}`).onclick = function() {
          const on = !this.classList.contains('active');
          this.classList.toggle('active', on);
          toggleIfMode(i, on);
        };
      });
    }

    function toggleIfMode(i, on) {
      const entry = document.getElementById(`examEntry${i}`);
      const inp = document.getElementById(`t${i}`);
      if (on) {
        entry.classList.add('if-mode');
        inp.placeholder = 'IF 시뮬레이션';
        inp.value = '';
      } else {
        entry.classList.remove('if-mode');
        inp.placeholder = '점수';
      }
    }

    function collectData() {
      const perf = [], exms = [];
      let sSum = 0, wSum = 0, tSum = 0;

      currentCfg.performances.forEach((p, i) => {
        const sc = +document.getElementById(`s${i}`).value || 0;
        perf.push({ label: p.label, score: sc, weight: p.weight });
        sSum += sc * (p.weight / 100); wSum += p.weight;
      });

      const ifActive = [];
      let mid = 0, finalW = 0;
      const tCnt = currentCfg.exams.length;
      currentCfg.exams.forEach((ex, i) => {
        const ifOn = document.getElementById(`if${i}`).classList.contains('active');
        ifActive.push(ifOn);
        const sc = ifOn ? 0 : (+document.getElementById(`t${i}`).value || 0);
        exms.push({ label: ex.label, score: sc, weight: ex.weight, ifMode: ifOn });
        if (tCnt === 1 || i === tCnt - 1) finalW = ex.weight / 100;
        else if (!ifOn) mid += sc * (ex.weight / 100);
        if (!ifOn) tSum += sc * (ex.weight / 100);
        wSum += ex.weight;
      });

      return { perf, exms, sSum, tSum, wSum, mid, finalW, ifActive, tCnt };
    }

    // --- Subject registration popup ---
    function modalConfigFromCounts() {
      const sCnt = +document.getElementById('modalSCount').value || 1;
      const tCnt = +document.getElementById('modalTCount').value || 1;
      return {
        performances: Array.from({ length: sCnt }, (_, i) => ({ label: `수행${i + 1}`, weight: 0, memo: '' })),
        exams: Array.from({ length: tCnt }, (_, i) => ({ label: `지필${i + 1}`, weight: 0 }))
      };
    }

    function renderWeightInputs(cfg) {
      let html = `<div id="modalWeightBar" class="weight-bar bad">비중 합계: <strong>0</strong>% / 100%</div>`;
      html += '<div class="section-head"><h2 style="font-size:16px;">수행평가 비중</h2><button type="button" class="mini-btn" id="modalResetWeightsBtn">0으로 초기화</button></div>';
      cfg.performances.forEach((p, i) => {
        html += `<div class="weight-row">
          <label>${p.label}</label>
          <input type="text" class="weight-memo" id="mmemo${i}" value="${p.memo || ''}" placeholder="메모 (선택)">
          <div class="weight-pct">
            <input type="number" id="msw${i}" value="${p.weight}" min="0" max="100" step="5" class="modal-weight-inp">
            <span class="pct-sign">%</span>
          </div>
        </div>`;
      });
      html += '<h2 style="font-size:16px;margin:16px 0 12px;">지필평가 비중</h2>';
      cfg.exams.forEach((ex, i) => {
        html += `<div class="weight-row">
          <label>${ex.label}</label>
          <span class="weight-spacer"></span>
          <div class="weight-pct">
            <input type="number" id="mtw${i}" value="${ex.weight}" min="0" max="100" step="5" class="modal-weight-inp">
            <span class="pct-sign">%</span>
          </div>
        </div>`;
      });
      document.getElementById('modalWeightInputs').innerHTML = html;
      document.querySelectorAll('.modal-weight-inp').forEach(inp => inp.addEventListener('input', updateModalWeightBar));
      document.getElementById('modalResetWeightsBtn').onclick = () => {
        document.querySelectorAll('.modal-weight-inp').forEach(inp => { inp.value = 0; });
        updateModalWeightBar();
      };
      updateModalWeightBar();
    }

    function updateModalWeightBar() {
      const bar = document.getElementById('modalWeightBar');
      if (!bar) return;
      let sum = 0;
      document.querySelectorAll('.modal-weight-inp').forEach(inp => { sum += +inp.value || 0; });
      bar.innerHTML = `비중 합계: <strong>${sum}</strong>% / 100%`;
      bar.classList.toggle('ok', sum === 100);
      bar.classList.toggle('bad', sum !== 100);
    }

    function snapshotModalWeights() {
      const snap = { sw: [], tw: [], memo: [] };
      for (let i = 0; i < 20; i++) {
        const sw = document.getElementById(`msw${i}`), tw = document.getElementById(`mtw${i}`), memo = document.getElementById(`mmemo${i}`);
        if (sw) snap.sw[i] = sw.value;
        if (tw) snap.tw[i] = tw.value;
        if (memo) snap.memo[i] = memo.value;
      }
      return snap;
    }

    function restoreModalWeights(snap) {
      snap.sw.forEach((v, i) => { const el = document.getElementById(`msw${i}`); if (el && v != null) el.value = v; });
      snap.tw.forEach((v, i) => { const el = document.getElementById(`mtw${i}`); if (el && v != null) el.value = v; });
      snap.memo.forEach((v, i) => { const el = document.getElementById(`mmemo${i}`); if (el && v != null) el.value = v; });
      updateModalWeightBar();
    }

    function openSubjectModal() {
      editingSubject = null;
      document.getElementById('modalSubjectName').value = '';
      document.getElementById('modalSCount').value = 2;
      document.getElementById('modalTCount').value = 2;
      document.getElementById('modalPeriods').value = '';
      renderWeightInputs(modalConfigFromCounts());
      renderModalSubjectList();
      document.getElementById('subjectModal').style.display = 'flex';
    }

    function editSubjectInModal(name) {
      editingSubject = name;
      const cfg = loadCustomSubjects()[name];
      document.getElementById('modalSubjectName').value = name;
      document.getElementById('modalSCount').value = cfg.performances.length;
      document.getElementById('modalTCount').value = cfg.exams.length;
      document.getElementById('modalPeriods').value = cfg.periods || '';
      renderWeightInputs(cfg);
      renderModalSubjectList();
      document.getElementById('subjectModal').style.display = 'flex';
    }

    function saveSubjectFromModal() {
      const name = document.getElementById('modalSubjectName').value.trim();
      if (!name) { alert('과목명을 입력하세요.'); return; }
      const sCnt = +document.getElementById('modalSCount').value;
      const tCnt = +document.getElementById('modalTCount').value;
      const performances = Array.from({ length: sCnt }, (_, i) => ({ label: `수행${i + 1}`, weight: +document.getElementById(`msw${i}`)?.value || 0, memo: document.getElementById(`mmemo${i}`)?.value.trim() || '' }));
      const exams = Array.from({ length: tCnt }, (_, i) => ({ label: `지필${i + 1}`, weight: +document.getElementById(`mtw${i}`)?.value || 0 }));
      const sum = performances.reduce((s, p) => s + p.weight, 0) + exams.reduce((s, e) => s + e.weight, 0);
      if (sum !== 100) { alert(`비중 합계가 100%가 아닙니다 (현재 ${sum}%).`); return; }
      const periods = +document.getElementById('modalPeriods').value || 0;

      const all = loadCustomSubjects();
      if (editingSubject && editingSubject !== name) delete all[editingSubject];
      all[name] = { performances, exams, periods };
      saveCustomSubjectsMap(all);

      if (selectedSubject === editingSubject) { selectedSubject = name; currentCfg = all[name]; renderScoreInputs(); }
      editingSubject = name;
      renderSubjectChips();
      renderModalSubjectList();
      alert(`"${name}" 과목이 저장되었습니다.`);
    }

    function renderModalSubjectList() {
      const all = loadCustomSubjects();
      const names = Object.keys(all);
      const box = document.getElementById('modalSubjectList');
      box.innerHTML = names.length ? names.map(name => {
        const c = all[name];
        return `<div class="subj-list-item">
          <div><strong>${name}</strong><div class="meta">수행 ${c.performances.length}개 · 지필 ${c.exams.length}개${c.periods ? ` · ${c.periods}차시` : ''}</div></div>
          <div class="subj-list-actions">
            <button type="button" class="mini-btn" data-edit="${name}">수정</button>
            <button type="button" class="mini-btn" data-del="${name}" style="color:var(--danger);">삭제</button>
          </div>
        </div>`;
      }).join('') : '<div class="empty-hint">등록된 과목이 없습니다.</div>';
      box.querySelectorAll('[data-edit]').forEach(b => b.onclick = () => editSubjectInModal(b.dataset.edit));
      box.querySelectorAll('[data-del]').forEach(b => b.onclick = () => {
        const name = b.dataset.del;
        if (!confirm(`"${name}" 과목을 삭제할까요?`)) return;
        const all = loadCustomSubjects();
        delete all[name];
        saveCustomSubjectsMap(all);
        if (selectedSubject === name) { selectedSubject = null; currentCfg = null; renderScoreInputs(); }
        renderSubjectChips();
        renderModalSubjectList();
      });
    }

    function buildSimulations(data) {
      const { exms, sSum, tSum, ifActive } = data;
      const sims = [];
      exms.forEach((ex, i) => {
        if (!ifActive[i]) return;
        const base = sSum + tSum; // tSum excludes IF exams (score=0)
        const w = ex.weight / 100;
        const rows = IF_SCENARIOS.map(sc => {
          const final = +(base + sc * w).toFixed(2);
          const grade = getGrade(final);
          return { sc, final, grade };
        });
        sims.push({ label: ex.label, rows });
      });
      return sims;
    }

    function buildTargetHints(data, final, grade) {
      const { sSum, mid, finalW, exms, ifActive, tCnt } = data;
      if (finalW <= 0) return '';
      const lastIdx = tCnt - 1;
      const targets = [
        { g: 'A', th: 90 }, { g: 'B', th: 80 }, { g: 'C', th: 70 }, { g: 'D', th: 60 }
      ];
      const chips = targets.map(({ g, th }) => {
        const need = (th - sSum - mid) / finalW;
        if (need > 100) return `<span class="target-chip">${g} 등급: 불가</span>`;
        if (need <= 0) return `<span class="target-chip">${g} 등급: 이미 달성 ✓</span>`;
        return `<span class="target-chip">${g} 등급: ${exms[lastIdx]?.label || '기말'} <strong>${need.toFixed(1)}점</strong> 필요</span>`;
      }).join('');
      return `<div class="target-box"><h4>🎯 목표 등급별 필요 점수 (마지막 시험 기준)</h4><div class="target-chips">${chips}</div></div>`;
    }

    function calculate() {
      if (!currentCfg) { alert('먼저 과목을 선택하거나 등록하세요.'); return; }
      saveDraft();
      const subj = selectedSubject;
      const data = collectData();
      const { perf, exms, sSum, tSum, wSum, mid, finalW, ifActive } = data;
      const anyIf = ifActive.some(Boolean);

      if (wSum !== 100) {
        document.getElementById('result').innerHTML = `<div class="result-main">❗ 총 비중이 100%가 아닙니다 (현재 <strong>${wSum}%</strong>)</div>`;
        return;
      }

      if (anyIf) {
        const sims = buildSimulations(data);
        let html = '<div class="result-main"><strong>📊 IF 시뮬레이션 결과</strong><br><span style="font-size:14px;color:var(--muted)">현재 수행평가 + 입력된 시험 점수 기준</span></div>';
        sims.forEach(sim => {
          html += `<div class="sim-box"><h4>${sim.label} 점수별 예상 원점수</h4><div class="sim-grid">`;
          sim.rows.forEach(r => {
            html += `<div class="sim-cell"><div>${r.sc}점</div><div class="sc">${r.final}</div><div class="gr" style="color:${GRADE_COLORS[r.grade]}">${r.grade}</div></div>`;
          });
          html += '</div></div>';
        });
        html += buildTargetHints(data, 0, '');
        document.getElementById('result').innerHTML = html;
        return;
      }

      const final = +(sSum + tSum).toFixed(2);
      const grade = getGrade(final);
      const nextTh = { A: null, B: 90, C: 80, D: 70, E: 60 }[grade];
      const currTh = { A: 90, B: 80, C: 70, D: 60, E: 0 }[grade];

      let nextMsg, dropMsg;
      if (nextTh) {
        const need = (nextTh - sSum - mid) / finalW;
        const nG = { 90: 'A', 80: 'B', 70: 'C', 60: 'D' }[nextTh];
        nextMsg = need > 100 ? `${nG} 등급 불가` : `${nG} 위해 ${need.toFixed(2)}점↑`;
      } else nextMsg = '최고 등급!';

      const drop = (currTh - 0.01 - sSum - mid) / finalW;
      dropMsg = drop < 0 ? '떨어질 등급 없음' : `${drop.toFixed(2)}점↓ (이하 ${{ 90: 'B', 80: 'C', 70: 'D', 60: 'E' }[currTh]})`;

      let html = `<div class="result-main">최종: <strong>${final}점</strong><br><span style="color:${GRADE_COLORS[grade]};font-weight:700;font-size:20px">${grade} 등급</span><br>${nextMsg}<br>${dropMsg}</div>`;
      html += buildTargetHints(data, final, grade);

      document.getElementById('result').innerHTML = html;

      const now = new Date();
      const formattedTime = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

      saveHistory({ time: formattedTime, subject: subj, final, grade, nextMsg, dropMsg, performances: perf, exams: exms });
      saveSubjectScore(subj, { final, grade, time: formattedTime });
      renderHistory();
    }

    function loadSubjectScores() { return JSON.parse(localStorage.getItem('subjectScores') || '{}'); }
    function saveSubjectScore(name, data) {
      const s = loadSubjectScores(); s[name] = data;
      localStorage.setItem('subjectScores', JSON.stringify(s));
    }
    function getLatestScoresForGraph() {
      const stored = loadSubjectScores();
      const custom = loadCustomSubjects();
      return Object.keys(stored).map(name => ({ name, periods: custom[name]?.periods || 0, ...stored[name] }));
    }

    function loadHistory() { return JSON.parse(localStorage.getItem('gradeHistory') || '[]'); }
    function saveHistory(entry) {
      const h = loadHistory(); h.unshift(entry);
      localStorage.setItem('gradeHistory', JSON.stringify(h.slice(0, 50)));
    }
    function deleteHistory(idx) {
      const h = loadHistory(); h.splice(idx, 1);
      localStorage.setItem('gradeHistory', JSON.stringify(h));
      renderHistory();
    }

    function renderHistory() {
      const tb = document.getElementById('historyBody');
      tb.innerHTML = '';
      loadHistory().forEach((it, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `

          <td><strong style="color:${GRADE_COLORS[it.grade]}">${it.grade}</strong></td>

      tb.querySelectorAll('.delete-btn').forEach(b => b.onclick = () => deleteHistory(+b.dataset.i));

      const newName = document.getElementById('editSubject').value.trim();

      document.getElementById('modalInnerContent').innerHTML = `
        <h2>과목명 수정</h2>
        <input type="text" id="editSubject" value="${e.subject || ''}" style="width:100%;font-size:18px;padding:8px;margin-bottom:16px;border:1px solid var(--inp-border);border-radius:8px;background:var(--inp-bg);color:var(--fg);">
        <h3>수행평가</h3>
        <div class="table-group"><table><thead><tr><th>회차</th><th>점수</th><th>비중(%)</th></tr></thead>

        <div class="table-group"><table><thead><tr><th>구분</th><th>점수</th><th>비중(%)</th></tr></thead>
        <tbody>${e.exams.map(ex => `<tr><td>${ex.label}</td><td>${ex.score}</td><td>${ex.weight}</td></tr>`).join('')}</tbody></table></div>

    function renderGraph() {
      const data = getLatestScoresForGraph();

      const gradeCount = { A: 0, B: 0, C: 0, D: 0, E: 0 };
      data.forEach(d => { if (gradeCount[d.grade] !== undefined) gradeCount[d.grade]++; });
      document.getElementById('gradeStats').innerHTML = Object.entries(gradeCount)
        .filter(([, c]) => c > 0)
        .map(([g, c]) => `<span class="grade-stat" style="color:${GRADE_COLORS[g]}">${g} ${c}과목</span>`)
        .join('') || '<span class="grade-stat">아직 등급 데이터 없음</span>';

      document.getElementById('graphSummary').innerHTML = data.length ? data.map(d =>
        `<div class="summary-card"><div class="subj">${d.name}</div><div class="score">${d.final}점</div><div style="color:${GRADE_COLORS[d.grade]};font-weight:600;margin-top:4px">${d.grade}${d.periods ? ` · ${d.periods}차시` : ''}</div></div>`
      ).join('') : '<div class="summary-card empty"><div class="score">계산 결과가 없습니다</div></div>';

      const totalPeriods = data.reduce((s, d) => s + (d.periods || 1), 0);
      const avg = data.length ? (data.reduce((s, d) => s + d.final * (d.periods || 1), 0) / totalPeriods).toFixed(2) : null;
      document.getElementById('avgBox').innerHTML = avg
        ? `차시 반영 평균: <strong>${avg}점</strong> (${data.length}과목)`
        : '계산기에서 각 과목 점수를 계산해 주세요.';

      const ranked = [...data].sort((a, b) => b.final - a.final);
      document.getElementById('rankBox').innerHTML = ranked.length ? `
        <h4>🏆 과목 순위</h4>
        ${ranked.map((d, i) => `<div class="rank-item"><span>${i + 1}. ${d.name}</span><span style="color:${GRADE_COLORS[d.grade]};font-weight:600">${d.final}점 (${d.grade})</span></div>`).join('')}
      ` : '';

      drawChart(data);
    }

    function drawChart(data) {
      const canvas = document.getElementById('scoreChart');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      const W = rect.width, H = rect.height;
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const grid = isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.08)';
      const barColors = ['#007aff', '#5856d6', '#34c759', '#ff9500', '#ff2d55', '#af52de'];

      ctx.clearRect(0, 0, W, H);
      const padL = 44, padR = 16, padT = 20, padB = 72;
      const chartW = W - padL - padR, chartH = H - padT - padB;

      ctx.strokeStyle = grid; ctx.lineWidth = 1;
      ctx.font = '12px sans-serif'; ctx.fillStyle = isDark ? '#98989d' : '#8e8e93'; ctx.textAlign = 'right';
      for (let v = 0; v <= 100; v += 20) {
        const y = padT + chartH - (v / 100) * chartH;
        ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
        ctx.fillText(v, padL - 8, y + 4);
      }

      // Grade cut lines
      [{ v: 90, c: '#2ecc7180' }, { v: 80, c: '#007aff60' }, { v: 70, c: '#ffcc0060' }, { v: 60, c: '#ff950060' }].forEach(({ v, c }) => {
        const y = padT + chartH - (v / 100) * chartH;
        ctx.strokeStyle = c; ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
        ctx.setLineDash([]);
      });

      const barGap = 12;
      const barW = (chartW - barGap * (data.length + 1)) / data.length;

      data.forEach((d, i) => {
        const x = padL + barGap + i * (barW + barGap);
        const score = d.final != null ? d.final : 0;
        const barH = (score / 100) * chartH;
        const y = padT + chartH - barH;
        ctx.fillStyle = d.final != null ? barColors[i % barColors.length] : (isDark ? '#3a3a3c' : '#d1d1d6');
        ctx.beginPath();
        const r = 6;
        ctx.moveTo(x + r, y); ctx.lineTo(x + barW - r, y);
        ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
        ctx.lineTo(x + barW, padT + chartH); ctx.lineTo(x, padT + chartH);
        ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.fill();
        if (d.final != null) {
          ctx.fillStyle = isDark ? '#f2f2f7' : '#1c1c1e';
          ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
          ctx.fillText(d.final.toFixed(1), x + barW / 2, y - 8);
        }
        ctx.fillStyle = isDark ? '#98989d' : '#8e8e93';
        ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
        wrapLabel(ctx, d.name, x + barW / 2, padT + chartH + 16, barW + 4, 12);
      });
    }

    function wrapLabel(ctx, text, cx, startY, maxW, lineH) {
      if (ctx.measureText(text).width <= maxW) { ctx.fillText(text, cx, startY); return; }
      let line = '', y = startY;
      for (const ch of text) {
        const test = line + ch;
        if (ctx.measureText(test).width > maxW && line) { ctx.fillText(line, cx, y); line = ch; y += lineH; }
        else line = test;
      }
      if (line) ctx.fillText(line, cx, y);
    }

    window.addEventListener('resize', () => {
      if (document.getElementById('graphView').style.display !== 'none') drawChart(getLatestScoresForGraph());
    });

    function downloadCanvasAsImage(canvas, filename) {
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function exportChartImage() {
      downloadCanvasAsImage(document.getElementById('scoreChart'), `원점수그래프_${Date.now()}.png`);
    }

    function buildSummaryCanvas(data) {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const cardBg = isDark ? '#1c1c1e' : '#ffffff';
      const pageBg = isDark ? '#000000' : '#f2f2f7';
      const borderColor = isDark ? '#3a3a3c' : '#c6c6c8';
      const mutedColor = isDark ? '#98989d' : '#8e8e93';
      const fgColor = isDark ? '#f2f2f7' : '#1c1c1e';

      const cols = 3;
      const cardW = 220, cardH = 100, gap = 12, pad = 20, headerH = 44;
      const rows = Math.max(1, Math.ceil(data.length / cols));
      const W = pad * 2 + cols * cardW + (cols - 1) * gap;
      const H = pad * 2 + headerH + rows * cardH + (rows - 1) * gap;

      const canvas = document.createElement('canvas');
      const dpr = window.devicePixelRatio || 1;
      canvas.width = W * dpr; canvas.height = H * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      ctx.fillStyle = pageBg; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = fgColor; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'left';
      ctx.fillText('과목별 원점수 현황', pad, pad + 20);

      data.forEach((d, i) => {
        const col = i % cols, row = Math.floor(i / cols);
        const x = pad + col * (cardW + gap);
        const y = pad + headerH + row * (cardH + gap);

        ctx.fillStyle = cardBg; ctx.strokeStyle = borderColor; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.roundRect(x, y, cardW, cardH, 12); ctx.fill(); ctx.stroke();

        ctx.textAlign = 'center';
        ctx.fillStyle = mutedColor; ctx.font = '13px sans-serif';
        ctx.fillText(d.name, x + cardW / 2, y + 26);

        ctx.fillStyle = fgColor; ctx.font = 'bold 24px sans-serif';
        ctx.fillText(`${d.final}점`, x + cardW / 2, y + 56);

        ctx.fillStyle = GRADE_COLORS[d.grade] || fgColor; ctx.font = 'bold 14px sans-serif';
        ctx.fillText(`${d.grade}${d.periods ? ` · ${d.periods}차시` : ''}`, x + cardW / 2, y + 78);
      });

      return canvas;
    }

    function exportSummaryImage() {
      const data = getLatestScoresForGraph();
      if (!data.length) { alert('저장할 데이터가 없습니다.'); return; }
      downloadCanvasAsImage(buildSummaryCanvas(data), `과목별원점수현황_${Date.now()}.png`);
    }

    window.onload = () => {
      renderSubjectChips();
      renderScoreInputs();
      renderHistory();
      document.getElementById('calcBtn').onclick = calculate;
      document.getElementById('manageSubjectsBtn').onclick = openSubjectModal;
      document.getElementById('modalSaveBtn').onclick = saveSubjectFromModal;
      ['modalSCount', 'modalTCount'].forEach(id => document.getElementById(id).addEventListener('change', () => {
        const snap = snapshotModalWeights();
        renderWeightInputs(modalConfigFromCounts());
        restoreModalWeights(snap);
      }));
      document.getElementById('resetBtn').onclick = () => {
        if (confirm('계산 기록을 모두 삭제하시겠습니까?')) {
          localStorage.removeItem('gradeHistory');
          renderHistory();
        }
      };
      document.getElementById('refreshGraphBtn').onclick = renderGraph;
      document.getElementById('downloadChartBtn').onclick = exportChartImage;
      document.getElementById('downloadSummaryBtn').onclick = exportSummaryImage;
    };

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('app-sw.js').catch(() => {});
    }
  </script>
